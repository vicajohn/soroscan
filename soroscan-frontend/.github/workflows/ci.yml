name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feat/theme/dark-toggle ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'

      - name: Install dependencies (shamefully-hoist for pnpm windows parity)
        run: pnpm install --shamefully-hoist

      - name: Run codegen (if present)
        run: pnpm run codegen --if-present

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test
